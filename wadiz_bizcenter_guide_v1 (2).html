];


let cur='all';

function tok(t){return t.toLowerCase().replace(/[^가-힣a-z0-9\s]/g,' ').split(/\s+/).filter(x=>x.length>0);}
function sc(faq,q){
  const ts=tok(q);let s=0;
  ts.forEach(t=>{
    if(faq.kw.some(k=>k.toLowerCase().includes(t)||t.includes(k.toLowerCase())))s+=3;
    if(faq.q.toLowerCase().includes(t))s+=2;
    if(faq.sum.toLowerCase().includes(t))s+=1;
    if(faq.tag.toLowerCase().includes(t))s+=1;
  });
  return s;
}
function doSearch(){
  const q=document.getElementById('srchInput').value.trim();
  if(!q){closeSr();return;}
  const res=F.map(f=>({f,s:sc(f,q)})).filter(r=>r.s>0).sort((a,b)=>b.s-a.s).slice(0,8);
  const wrap=document.getElementById('srWrap');
  const list=document.getElementById('srList');
  document.getElementById('srTitle').textContent=`"${q}" 검색 결과 ${res.length}건`;
  wrap.classList.add('show');
  if(res.length===0){list.innerHTML='<div class="sr-empty">관련 가이드를 찾지 못했습니다. 다른 키워드로 검색해보세요.</div>';return;}
  list.innerHTML=res.map(r=>{
    const f=r.f;
    return`<div class="sr-item" onclick="goFaq('${f.tab}','${encodeURIComponent(f.q)}')">
      <div class="sr-tags"><span class="sr-tag" style="background:${f.tc}15;color:${f.tc}">${f.tag}</span>${f.sc?'<span class="slack-badge">슬랙케이스</span>':''}</div>
      <div class="sr-item-q">${f.q}</div>
      <div class="sr-item-sum">${f.sum.substring(0,90)}...</div>
    </div>`;
  }).join('');
}
function goFaq(tab,eq){
  closeSr();sw(tab);
  setTimeout(()=>{
    const q=decodeURIComponent(eq);
    document.querySelectorAll('.fq-title').forEach((el,i)=>{
      if(el.textContent===q){
        const fa=document.getElementById('fa'+i);
        const fch=document.getElementById('fch'+i);
        if(fa&&!fa.classList.contains('open')){fa.classList.add('open');fch.classList.add('open');}
        el.closest('.fi').scrollIntoView({behavior:'smooth',block:'center'});
      }
    });
  },100);
}
function closeSr(){document.getElementById('srWrap').classList.remove('show');}
function setQ(q){document.getElementById('srchInput').value=q;doSearch();}
document.getElementById('srchInput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});

function renderTabs(){
  const row=document.getElementById('tabs');
  const cnt={};F.forEach(f=>{cnt[f.tab]=(cnt[f.tab]||0)+1;});
  row.innerHTML=TABS.map(t=>{const c=t.id==='all'?F.length:(cnt[t.id]||0);return`<button class="tab${t.id===cur?' on':''}" onclick="sw('${t.id}')">${t.label}<span class="n">${c}</span></button>`;}).join('');
}
function renderFaqs(){
  const list=document.getElementById('flist');
  const items=cur==='all'?F:F.filter(f=>f.tab===cur);
  list.innerHTML=items.map((f,i)=>`
    <div class="fi${f.sc?' sc':''}">
      <div class="fq" onclick="tFaq(${i})">
        <div class="fq-l">
          <div class="fq-tags"><span class="ftag" style="background:${f.tc}15;color:${f.tc}">${f.tag}</span>${f.sc?'<span class="slack-badge">슬랙케이스</span>':''}</div>
          <div class="fq-title">${f.q}</div>
        </div>
        <i class="ti ti-chevron-down fchev" id="fch${i}"></i>
      </div>
      <div class="fa" id="fa${i}">
        <div class="fa-body">
          <p class="fa-sum">${f.sum}</p>
          <div class="stog"><div class="st-h" onclick="tSub('sg${i}','sc${i}',event)"><span class="st-hl"><i class="ti ti-list-details"></i>세부 가이드</span><i class="ti ti-chevron-down st-chev" id="sc${i}"></i></div><div class="st-b" id="sg${i}">${f.g}</div></div>
          ${f.c?`<div class="stog"><div class="st-h" onclick="tSub('sb${i}','sc2${i}',event)"><span class="st-hl cl"><i class="ti ti-file-description"></i>실제 사례 / 슬랙 원문</span><i class="ti ti-chevron-down st-chev" id="sc2${i}"></i></div><div class="st-b" id="sb${i}">${f.c}</div></div>`:''}
        </div>
      </div>
    </div>`).join('');
}
function sw(id){cur=id;renderTabs();renderFaqs();}
function tFaq(i){document.getElementById('fa'+i).classList.toggle('open');document.getElementById('fch'+i).classList.toggle('open');}
function tSub(bId,cId,e){e.stopPropagation();document.getElementById(bId).classList.toggle('open');document.getElementById(cId).classList.toggle('open');}

document.getElementById('totalCnt').textContent=F.length;
document.getElementById('slackCnt').textContent=F.filter(f=>f.sc).length;
// v8: 43개 항목, 슬랙케이스 26개
renderTabs();renderFaqs();
</script>
